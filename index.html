<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUI | Art & Engineering</title>
    <meta name="description" content="Portfolio of GUI - Specializing in art, electrical engineering, networks, and software.">
    
    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --phi: 1.618;
            --phi-inv: 0.618;
            --accent: #ffffff;
            --glass: rgba(0, 0, 0, 0.45);
            --glass-border: rgba(255, 255, 255, 0.1);
            --bg-dark: #0a0a0a;
            --font-main: 'Outfit', sans-serif;
            --font-heading: 'Space+Grotesk', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: var(--font-main);
            -webkit-font-smoothing: antialiased;
        }

        /* Fullscreen Background Video */
        #video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.7);
        }

        /* Grid Layout using Golden Ratio */
        .layout-container {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(12, 1fr);
            height: 100vh;
            width: 100vw;
            padding: calc(4vw / var(--phi));
        }

        /* Experimental Aurea-based Layout 
           Positioning the content in the "Golden Section" of the screen (bottom-left area)
        */
        .content-card {
            grid-column: 1 / span 5;
            grid-row: 7 / span 6;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-start;
            padding: calc(2rem * var(--phi-inv));
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .qr-section {
            width: calc(120px * var(--phi-inv));
            margin-bottom: 1.5rem;
            opacity: 0.9;
            transition: transform 0.3s ease;
        }

        .qr-section:hover {
            transform: scale(1.05);
            opacity: 1;
        }

        .qr-section img {
            width: 100%;
            height: auto;
            display: block;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: calc(3.5rem * var(--phi-inv));
            font-weight: 700;
            letter-spacing: 0.2rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 1rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem;
            width: 100%;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.15rem;
            font-weight: 500;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Animations */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Adjustments */
        @media (max-width: 1024px) {
            .content-card {
                grid-column: 1 / span 8;
            }
        }

        @media (max-width: 768px) {
            .layout-container {
                display: block;
                padding: 2rem;
            }
            .content-card {
                height: 100%;
                width: 100%;
                background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
                backdrop-filter: none;
                border: none;
            }
            h1 {
                font-size: 2.5rem;
            }
        }

        /* Subtle noise texture for premium feel */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            opacity: 0.03;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
        }
    </style>
</head>
<body>

    <div class="noise"></div>

    <video autoplay muted loop playsinline poster="01.png" id="video-background">
        <source src="S8.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <main class="layout-container">
        <section class="content-card">
            <div class="qr-section">
                <img src="guivustoqr.png" alt="GUI QR Code" id="qr-image">
            </div>
            
            <h1>GUI</h1>
            <p class="tagline">art &bull; electrical &bull; network &bull; software</p>
            
            <nav class="nav-links">
                <a href="http://www.instagram.com/gui.shade" target="_blank">Instagram</a>
                <a href="http://t.me/guishade" target="_blank">Telegram</a>
                <a href="https://matrix.to/#/@gui.shade:matrix.org" target="_blank">Matrix</a>
                <a href="http://github.com/guishade" target="_blank">Github</a>
                <a href="http://www.youtube.com/user/GRAPHICUSERINTERFACE" target="_blank">Youtube</a>
                <a href="https://photos.app.goo.gl/5S1XneABbm4ScpSu9" target="_blank">Work</a>
                <a href="mailto:gui.shade@gmail.com">Mail</a>
            </nav>
        </section>
    </main>

    <script>
        // Simple script to handle video fallback or interactions if needed
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('video-background');
            // Ensure video plays on mobile
            video.play().catch(error => {
                console.log("Video autoplay blocked or failed:", error);
            });
        });
    </script>
</body>
</html>
